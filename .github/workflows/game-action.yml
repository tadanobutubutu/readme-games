name: Game Action

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  play:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        ref: main
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --no-cache-dir -r requirements.txt
    
    - name: Execute game move
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        COMMENT_BODY: ${{ github.event.comment.body || github.event.issue.body }}
        ACTOR: ${{ github.event.comment.user.login || github.event.issue.user.login }}
        REPO: ${{ github.repository }}
      run: python game.py
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Game Bot"
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "🎮 Update game state by @${{ github.event.comment.user.login || github.event.issue.user.login }}" && git push)
